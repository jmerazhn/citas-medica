# ── BI App (difiesta-bi-app) ──────────────────────────────────────────────────
server {
    listen 80;
    server_name bi.tu-dominio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bi.tu-dominio.com;

    ssl_certificate     /etc/nginx/certs/live/bi.tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/bi.tu-dominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://difiesta-bi-app:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
