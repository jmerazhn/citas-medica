services:

  citas-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: citas-app
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8081:80"
    volumes:
      - citas_storage:/var/www/citas/storage/app
      - citas_logs:/var/www/citas/storage/logs
    networks:
      - citas-network
    depends_on:
      citas-db:
        condition: service_healthy

  citas-db:
    image: mysql:8.0
    container_name: citas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - citas_mysql:/var/lib/mysql
    networks:
      - citas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  citas_storage:
  citas_logs:
  citas_mysql:

networks:
  citas-network:
    driver: bridge
